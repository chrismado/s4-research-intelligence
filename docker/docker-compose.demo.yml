version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - ollama
    environment:
      - S4RI_LLM_BASE_URL=http://ollama:11434
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"

volumes:
  ollama_data:
